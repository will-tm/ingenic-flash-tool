name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/

  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install .
      - name: CLI smoke test
        run: |
          ingenic-flash-tool --help
          ingenic-flash-tool info
          ingenic-flash-tool info --chip prj008
          ingenic-flash-tool detect || true  # no device in CI
      - name: Import test
        run: |
          python -c "from ingenic_flash import __version__; print(f'v{__version__}')"
          python -c "from ingenic_flash.chips import CHIPS; print(f'{len(CHIPS)} chips')"
          python -c "from ingenic_flash.protocol import find_firmware_dir; print(find_firmware_dir('prj008'))"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
